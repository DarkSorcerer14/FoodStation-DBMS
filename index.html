<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodStation — Multi-Vendor Food Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #E8380D;
    --accent-glow: rgba(232,56,13,0.35);
    --surface: rgba(255,255,255,0.04);
    --surface-border: rgba(255,255,255,0.08);
    --text: #F5F5F7;
    --text-sub: #86868B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #000; color: var(--text);
    height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }

  /* Animated background */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -20%, rgba(232,56,13,0.12), transparent),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(232,56,13,0.06), transparent),
      #050505;
  }
  .bg-layer::after {
    content: ''; position: absolute; inset: 0;
    background: url('https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=1920') center/cover;
    opacity: 0.06; filter: saturate(0);
  }

  /* Grid lines for depth */
  .grid-lines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Sim Button */
  .sim-btn {
    position: fixed; top: 28px; right: 28px; z-index: 100;
    background: var(--surface); backdrop-filter: blur(20px);
    border: 1px solid var(--surface-border); color: var(--text-sub);
    padding: 10px 22px; border-radius: 10px; font-weight: 600;
    cursor: pointer; font-family: 'Inter'; font-size: 13px;
    letter-spacing: -0.2px; transition: all 0.3s;
  }
  .sim-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }

  /* Card */
  .login-card {
    position: relative; z-index: 10;
    background: var(--surface); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--surface-border); border-radius: 28px;
    padding: 48px 40px; width: 420px; max-width: 92%;
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .login-card::before {
    content: ''; position: absolute; top: -1px; left: 40px; right: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .brand { text-align: center; margin-bottom: 40px; }
  .brand h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -1.5px;
    color: var(--text);
  }
  .brand h1 span { color: var(--accent); }
  .brand p {
    font-size: 14px; color: var(--text-sub); margin-top: 8px;
    font-weight: 400; letter-spacing: -0.1px;
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-sub); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  input, select {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px;
    font-weight: 500; outline: none; transition: all 0.25s;
    -webkit-appearance: none;
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  input:focus, select:focus {
    border-color: var(--accent); background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  select option { background: #1a1a1a; color: white; }

  .btn-login {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Inter'; letter-spacing: -0.3px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 8px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-login:hover {
    transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow);
    filter: brightness(1.1);
  }
  .btn-login:active { transform: translateY(0) scale(0.98); }

  .footer-text {
    text-align: center; margin-top: 28px; font-size: 12px; color: var(--text-sub);
    font-weight: 400; letter-spacing: -0.1px;
  }
  .footer-text span { color: var(--accent); font-weight: 600; }

  @media (max-width: 480px) {
    .login-card { padding: 36px 24px; border-radius: 20px; }
    .brand h1 { font-size: 24px; }
  }
</style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="grid-lines"></div>

  <button class="sim-btn" onclick="startSimulation()">Run System Simulation</button>
  <script>
    function startSimulation() {
      sessionStorage.setItem('simulation', 'customer');
      window.location.href = 'customer_portal.html';
    }
  </script>

  <div class="login-card">
    <div class="brand">
      <h1>Food<span>Station</span></h1>
      <p>Multi-Vendor Food Delivery System</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Role</label>
        <select id="role" required>
          <option value="customer">Customer</option>
          <option value="vendor">Restaurant Vendor</option>
          <option value="admin">System Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required value="demo@foodstation.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required value="password123">
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="footer-text">Powered by <span>FoodStation</span> DBMS</div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const role = document.getElementById('role').value;
      const btn = document.querySelector('.btn-login');
      btn.textContent = 'Authenticating...';
      btn.style.opacity = '0.8';

      setTimeout(() => {
        if (role === 'customer') {
          window.location.href = '/customer_portal.html';
        } else if (role === 'vendor') {
          window.location.href = '/vendor_dashboard.html';
        } else if (role === 'admin') {
          window.location.href = '/admin_dashboard.html';
        }
      }, 800);
    }
  </script>
</body>
</html>
